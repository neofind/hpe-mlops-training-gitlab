apiVersion: v1
kind: Namespace
metadata:
  name: db-nginx
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-nginx
  namespace: db-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db-nginx
  template:
    metadata:
      labels:
        app: db-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: db-nginx
  namespace: db-nginx
spec:
  type: NodePort
  selector:
    app: db-nginx
  ports:
    - port: 80
      targetPort: 80
